<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Niche CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/map.js"></script>
</head>
<body>
<div style="display:flex;min-height:100vh">
  <aside style="width:260px;background:#0f111a;border-right:1px solid #1e293b">
    <div class="sidebar-logo">
      <div style="width:36px;height:36px;background:#38bdf8;border-radius:10px"></div>
      <div><div class="sidebar-logo-text">Niche CRM</div><div class="sidebar-logo-version">v1.0</div></div>
    </div>
    <div class="sb-section"><div class="sb-section-label">PRINCIPAL</div></div>
    <div class="sb-item active"><span class="icon">📊</span> Dashboard</div>
    <div class="sb-item"><span class="icon">👥</span> People</div>
    <div class="sb-item"><span class="icon">⟶</span> Pipeline</div>
    <div class="sb-item"><span class="icon">📁</span> Projects</div>
    <div class="sb-section mt-20"><div class="sb-section-label">CLIENT</div></div>
    <div class="sb-item" onclick="window.location='client-portal.html'"><span class="icon">🌐</span> Portail client</div>
  </aside>
  
  <main style="flex:1;padding:24px">
    <h1 style="font-size:28px;margin-bottom:8px">Tableau de bord</h1>
    <p style="color:#64748b;margin-bottom:24px">Bienvenue sur Niche CRM</p>
    
    <div class="grid-4">
      <div class="metric"><div class="metric-label">💰 Revenus</div><div class="metric-value">0 €</div></div>
      <div class="metric"><div class="metric-label">👥 Clients</div><div class="metric-value">0</div></div>
      <div class="metric"><div class="metric-label">📁 Projets</div><div class="metric-value">0</div></div>
      <div class="metric"><div class="metric-label">⭐ Deals</div><div class="metric-value">0</div></div>
    </div>
    
    <div class="card mt-20">
      <div class="card-header"><div class="card-title">🗺️ Localisation des clients</div><span class="badge-blue">3 clients</span></div>
      <div id="client-map" style="height:350px;width:100%"></div>
    </div>
  </main>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if(typeof initMap === 'function') initMap('client-map');
});
</script>
</body>
</html>
